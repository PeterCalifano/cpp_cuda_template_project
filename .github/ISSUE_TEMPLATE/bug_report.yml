name: Bug report
description: Report a reproducible build, runtime, wrapper, documentation, or packaging problem.
title: "[BUG] "
labels:
  - major-bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: State the observed failure and the expected behavior.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - C++ library
        - CUDA or OptiX
        - Python wrapper
        - MATLAB wrapper
        - Versioning or packaging
        - Documentation or GitHub Pages
        - CI workflow
        - Testfield or nested-library validation
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction commands
      description: Paste the exact commands from a clean checkout or clean build directory.
      render: bash
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output excerpt
      description: Include the first real error and the surrounding context.
      render: text
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system and runner
      placeholder: "Ubuntu 24.04, GitHub-hosted ubuntu-latest, self-hosted Linux X64, Jetson Orin, ..."
    validations:
      required: true
  - type: input
    id: compiler
    attributes:
      label: Compiler and CMake
      placeholder: "GCC 13.2, CMake 3.28.3, CUDA 12.6"
    validations:
      required: true
  - type: textarea
    id: configuration
    attributes:
      label: Build configuration
      description: Include CMake cache flags, wrapper flags, CUDA architecture, toolchain file, and whether this is a top-level or nested build.
      render: text
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I verified whether the failure occurs in a clean build directory.
        - label: I included whether the project is built top-level or through add_subdirectory.
        - label: I included Pages URL or workflow run URL when reporting documentation publishing.
