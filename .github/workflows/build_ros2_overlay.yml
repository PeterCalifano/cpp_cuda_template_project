name: build_ros2_overlay
run-name: Build optional ROS 2 overlay

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
      - "main"
      - "develop"
    paths:
      - ros2/**
      - build_ros2.sh
      - add_ros2_support.sh
      - generate_version.sh
      - tailor_template_cleanup.sh
      - doc/ros2_overlay.md
      - doc/template_usage.md
      - doc/bootstrap_prompts.md
      - README.md
      - AGENTS.md
      - CLAUDE.md
      - python/COLCON_IGNORE
      - lib/COLCON_IGNORE
      - examples/COLCON_IGNORE
      - tests/COLCON_IGNORE
      - tests/cmake/VerifyTemplateProjectRos2Overlay.cmake
      - tests/template_test/testRos2OverlayStatic.py
      - .github/workflows/build_ros2_overlay.yml
  pull_request:
    branches:
      - "master"
      - "main"
      - "develop"
      - "dev*"
    paths:
      - ros2/**
      - build_ros2.sh
      - add_ros2_support.sh
      - generate_version.sh
      - tailor_template_cleanup.sh
      - doc/ros2_overlay.md
      - doc/template_usage.md
      - doc/bootstrap_prompts.md
      - README.md
      - AGENTS.md
      - CLAUDE.md
      - python/COLCON_IGNORE
      - lib/COLCON_IGNORE
      - examples/COLCON_IGNORE
      - tests/COLCON_IGNORE
      - tests/cmake/VerifyTemplateProjectRos2Overlay.cmake
      - tests/template_test/testRos2OverlayStatic.py
      - .github/workflows/build_ros2_overlay.yml

jobs:
  overlay-build:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install ROS 2 overlay dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential cmake git libeigen3-dev python3-colcon-common-extensions python3-pytest ros-dev-tools
          rosdep update
          rosdep install --from-paths ros2 -i -r -y --rosdistro jazzy

      - name: Build and test ROS 2 overlay
        shell: bash
        run: ./build_ros2.sh --clean

      - name: Run static ROS 2 overlay checks
        shell: bash
        run: |
          if [[ -f tests/template_test/testRos2OverlayStatic.py ]]; then
            python3 -m pytest -q tests/template_test/testRos2OverlayStatic.py
          else
            echo "Skipping template-only pytest checks; file is not present."
          fi

          if [[ -f tests/cmake/VerifyTemplateProjectRos2Overlay.cmake ]]; then
            expected_version="$(python3 -c 'import xml.etree.ElementTree as ET; print(ET.parse("ros2/template_project/package.xml").getroot().findtext("version"))')"
            cmake \
              -DTEST_TEMPLATE_SOURCE_DIR="${PWD}" \
              -DTEST_BINARY_ROOT="${RUNNER_TEMP}/ros2_overlay_static" \
              -DEXPECTED_VERSION="${expected_version}" \
              -P tests/cmake/VerifyTemplateProjectRos2Overlay.cmake
          else
            echo "Skipping template-only CMake checks; verifier is not present."
          fi

  rollout-dogfood:
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect template rollout tooling
        id: rollout-tooling
        shell: bash
        run: |
          if [[ -f add_ros2_support.sh && -f tailor_template_cleanup.sh ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping template-only rollout dogfood; rollout helpers are not present."
          fi

      - name: Install ROS 2 overlay dependencies
        if: steps.rollout-tooling.outputs.available == 'true'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential cmake git libeigen3-dev python3-colcon-common-extensions python3-pytest ros-dev-tools
          rosdep update
          rosdep install --from-paths ros2 -i -r -y --rosdistro jazzy

      - name: Rehearse additive rollout
        if: steps.rollout-tooling.outputs.available == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          scratch_dir="$(mktemp -d)"
          target_dir="${scratch_dir}/target"
          mkdir -p "${target_dir}"
          tar \
            --exclude='./.git' \
            --exclude='./ros2/build' \
            --exclude='./ros2/install' \
            --exclude='./ros2/log' \
            -cf - . | tar -C "${target_dir}" -xf -
          (cd "${target_dir}" && ./tailor_template_cleanup.sh --apply --yes --remove-ros2)
          ./add_ros2_support.sh --root "${target_dir}" --apply --yes --verify
          (cd "${target_dir}" && ./build_ros2.sh --clean)
          (cd "${target_dir}" && cmake -S . -B build_plain -DENABLE_TESTS=OFF && cmake --build build_plain -j2)
